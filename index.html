<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aksharadhama ICSE School</title>
    <style>

        body {
            margin: 0;
            padding: 0;
            background: border-box;
        }

        /* ── Banner ── */
        .banner {
            background: #000000;
            color: #ffffff;
            /* padding: 10px 0; */
            overflow: hidden;
            height: 100vh;
            /* width: 100vw; */
            flex-shrink: 0;
        }

        .scroll-content {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            white-space: nowrap;
            animation: scroll-left 30s linear infinite;
            height: 100%;
        }

        .scroll-content img {
            height: 50px;
            width: 50px;
            object-fit: cover;
            /* logo_css goes here if needed */
        }

        @keyframes scroll-left {
            from { transform: translateX(100vw); }
            to   { transform: translateX(-100%); }
        }

        .scroll-text {
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 1px;
            padding-left: 15px;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="scroll-content">
            <img src="aksharadhama_shivamogga_uqfypu-Profile.png" alt="Aksharadhama ICSE School">
            <span class="scroll-text">WELCOME TO ST. JOSEPH'S AKSHARADHAMA ICSE SCHOOL &nbsp; &nbsp; 1st BI-MONTHLY ASSESSMENT – 2026 
                FOR CLASSES VIII, IX & X  -  STARTS FROM 15th JUNE 2026</span>
        </div>
    </div>
</body>
</html>
